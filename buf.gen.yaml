version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/swappableqm/swapperd/proto/gen
plugins:
  - remote: buf.build/protocolbuffers/go
    out: proto/gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/gosimple
    out: proto/gen
    opt:
      - paths=source_relative
      - simple
inputs:
  - directory: proto/svc